<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RED — Refine Every Detail</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <div class="header">
      <div class="header-logo">✦</div>
      <div>
        <div class="header-title">RED</div>
        <div class="header-subtitle">claude.ai extension</div>
      </div>
    </div>

    <div id="view-login">
      <div class="form-error" id="login-error"></div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
      </div>

      <button class="btn btn--primary" id="btn-signin">Sign In</button>

      <div class="divider"><span>or</span></div>

      <button class="btn btn--google" id="btn-google">
        <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.54 28.59A14.5 14.5 0 0 1 9.5 24c0-1.59.28-3.14.76-4.59l-7.98-6.19A23.99 23.99 0 0 0 0 24c0 3.77.87 7.35 2.56 10.56l7.98-5.97z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.15 15.9-5.82l-7.73-6c-2.15 1.44-4.91 2.3-8.17 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 5.97C6.51 42.62 14.62 48 24 48z"/></svg>
        Sign in with Google
      </button>

      <div class="toggle-form" id="toggle-signup">Don't have an account? Sign up</div>
    </div>

    <div id="view-account" style="display:none">
      <div class="account-info">
        <div class="info-row">
          <span class="info-label">Plan</span>
          <span class="info-value"><span class="plan-badge" id="plan-badge">Free</span></span>
        </div>
        <div class="info-row">
          <span class="info-label">Today's usage</span>
          <span class="info-value" id="quota-display">—</span>
        </div>
        <div class="info-row" id="upgrade-row" style="display:none">
          <span class="info-label"></span>
          <a class="upgrade-link" id="btn-upgrade">Upgrade to Premium →</a>
        </div>
        <div id="upgrade-msg" style="display:none;font-size:0.8rem;color:var(--brand);text-align:center;padding:8px 0 0 0;font-weight:600;"></div>
      </div>

      <button class="btn btn--primary" id="btn-refresh">Refresh</button>
      <div style="text-align:center">
        <a class="signout-link" id="btn-signout">Sign out</a>
      </div>
    </div>

    <div id="view-signup" style="display:none">
      <div class="form-error" id="signup-error"></div>

      <div class="form-group">
        <label for="signup-email">Email</label>
        <input type="email" id="signup-email" placeholder="you@example.com" autocomplete="email">
      </div>

      <div class="form-group">
        <label for="signup-password">Password</label>
        <input type="password" id="signup-password" placeholder="At least 6 characters" autocomplete="new-password">
      </div>

      <button class="btn btn--primary" id="btn-signup">Create Account</button>

      <div class="toggle-form" id="toggle-login">Already have an account? Sign in</div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
